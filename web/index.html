<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reversion Model — Live Predictions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #161616;
            --bg-tertiary: #1a1a1a;
            --border-subtle: #282828;
            --border-emphasis: #3a3a3a;
            --text-primary: #e8e8e8;
            --text-secondary: #9a9a9a;
            --text-tertiary: #6a6a6a;
            --accent-cyan: #00d9ff;
            --accent-cyan-dim: #00a3c4;
            --accent-green: #00ff94;
            --accent-red: #ff3366;
            --accent-amber: #ffb84d;
            --grid-color: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: gridFadeIn 1.5s ease-out 0.3s forwards;
        }

        @keyframes gridFadeIn {
            to { opacity: 1; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            margin-bottom: 60px;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 40px;
            opacity: 0;
            animation: slideDown 0.8s ease-out 0.1s forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .model-info {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .model-info::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .divider {
            color: var(--border-emphasis);
            margin: 0 4px;
        }

        /* Primary Metrics */
        .primary-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.3s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .metric-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            padding: 36px 32px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .metric-card:hover {
            border-color: var(--border-emphasis);
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .metric-card:hover::before {
            opacity: 1;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }

        .metric-value {
            font-size: 72px;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
        }

        .metric-value.positive {
            color: var(--accent-green);
        }

        .metric-value.neutral {
            color: var(--text-primary);
        }

        .metric-value.negative {
            color: var(--accent-red);
        }

        .metric-subtext {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .metric-target {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: 2px;
            font-size: 11px;
            margin-top: 8px;
        }

        /* Secondary Metrics */
        .secondary-metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.5s forwards;
        }

        .mini-metric {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            padding: 20px 18px;
            transition: all 0.3s ease;
        }

        .mini-metric:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
        }

        .mini-metric-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 10px;
        }

        .mini-metric-value {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        /* Performance Breakdown */
        .section {
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.7s forwards;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .section-title {
            font-family: 'Crimson Pro', serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .section-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
        }

        /* Performance Grid */
        .performance-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .performance-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .performance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .performance-tier {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 8px;
            border-radius: 2px;
            font-weight: 500;
        }

        .tier-high {
            background: rgba(0, 255, 148, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(0, 255, 148, 0.2);
        }

        .tier-medium {
            background: rgba(255, 184, 77, 0.1);
            color: var(--accent-amber);
            border: 1px solid rgba(255, 184, 77, 0.2);
        }

        .tier-low {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .performance-count {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .performance-rate {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .performance-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .performance-fill {
            height: 100%;
            background: var(--accent-cyan);
            border-radius: 2px;
            transition: width 1s ease-out;
        }

        /* Predictions Table */
        .predictions-table {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-emphasis);
        }

        th {
            text-align: left;
            padding: 16px 20px;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
        }

        tbody tr {
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: var(--bg-tertiary);
        }

        td {
            padding: 18px 20px;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        .ticker {
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.05em;
        }

        .date {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .move-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: 500;
        }

        .move-up {
            background: rgba(0, 255, 148, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(0, 255, 148, 0.2);
        }

        .move-down {
            background: rgba(255, 51, 102, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        .probability {
            font-weight: 600;
            color: var(--accent-cyan);
        }

        .result-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 600;
        }

        .result-correct {
            background: rgba(0, 255, 148, 0.15);
            color: var(--accent-green);
        }

        .result-wrong {
            background: rgba(255, 51, 102, 0.15);
            color: var(--accent-red);
        }

        .result-pending {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-tertiary);
            font-size: 9px;
        }

        /* Loading States */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            gap: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        .error {
            background: rgba(255, 51, 102, 0.05);
            border: 1px solid rgba(255, 51, 102, 0.2);
            padding: 32px;
            border-radius: 2px;
            margin: 40px 0;
        }

        .error-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-red);
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Footer */
        footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-tertiary);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .update-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 2px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .primary-metrics {
                grid-template-columns: 1fr;
            }

            .performance-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 36px;
            }

            .metric-value {
                font-size: 56px;
            }

            .secondary-metrics {
                grid-template-columns: repeat(2, 1fr);
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .secondary-metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Reversion Model</h1>
            <div class="model-info">
                <span>CATALYST-AWARE MEAN REVERSION</span>
                <span class="divider">|</span>
                <span>67.7% BACKTEST ACCURACY</span>
            </div>
        </header>

        <div id="app">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">LOADING PREDICTION DATA</div>
            </div>
        </div>

        <footer>
            <div class="update-info">
                <span>AUTOMATED DAILY AT 21:15 UTC</span>
                <span class="divider">|</span>
                <span>LAST UPDATE: <span id="last-update">--</span></span>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>OPERATIONAL</span>
            </div>
        </footer>
    </div>

    <script>
        // Parse dashboard text and extract predictions
        function parsePredictions(text) {
            const predictions = [];
            const lines = text.split('\n');

            // Look for prediction lines (format: "2026-03-06 NVDA | UP 5.2% | earnings | Prob:68.0% high | ✓ CORRECT")
            const predictionRegex = /(\d{4}-\d{2}-\d{2})\s+(\w+)\s+\|\s+(UP|DOWN)\s+([\d.]+)%\s+\|\s+(\w+)\s+\|\s+Prob:([\d.]+)%\s+(\w+)\s+\|\s+(.*?)$/;

            for (const line of lines) {
                const match = line.match(predictionRegex);
                if (match) {
                    predictions.push({
                        date: match[1],
                        ticker: match[2],
                        direction: match[3],
                        magnitude: parseFloat(match[4]),
                        catalyst: match[5],
                        probability: parseFloat(match[6]),
                        confidence: match[7],
                        result: match[8].trim()
                    });
                }
            }

            return predictions;
        }

        // Parse performance by tier
        function parsePerformanceByTier(text) {
            const tiers = {};

            // Match lines like "HIGH     14     10     71.4%"
            const highMatch = text.match(/HIGH\s+(\d+)\s+(\d+)\s+([\d.]+)%/);
            const mediumMatch = text.match(/MEDIUM\s+(\d+)\s+(\d+)\s+([\d.]+)%/);
            const lowMatch = text.match(/LOW\s+(\d+)\s+(\d+)\s+([\d.]+)%/);

            if (highMatch) {
                tiers.high = { total: parseInt(highMatch[1]), correct: parseInt(highMatch[2]), rate: parseFloat(highMatch[3]) };
            }
            if (mediumMatch) {
                tiers.medium = { total: parseInt(mediumMatch[1]), correct: parseInt(mediumMatch[2]), rate: parseFloat(mediumMatch[3]) };
            }
            if (lowMatch) {
                tiers.low = { total: parseInt(lowMatch[1]), correct: parseInt(lowMatch[2]), rate: parseFloat(lowMatch[3]) };
            }

            return tiers;
        }

        async function loadDashboardData() {
            const app = document.getElementById('app');

            try {
                const response = await fetch('https://api.github.com/repos/klossjdaniel-hub/swing-model/contents/daily_results');

                if (!response.ok) {
                    throw new Error('Failed to fetch data from GitHub');
                }

                const files = await response.json();
                const dashboardFiles = files.filter(f => f.name.startsWith('dashboard_'));

                if (dashboardFiles.length === 0) {
                    throw new Error('No prediction data available yet');
                }

                const latestFile = dashboardFiles.sort((a, b) => b.name.localeCompare(a.name))[0];
                const fileResponse = await fetch(latestFile.download_url);
                const dashboardText = await fileResponse.text();

                renderDashboard(dashboardText, latestFile.name);

            } catch (error) {
                console.error('Error loading data:', error);
                app.innerHTML = `
                    <div class="error">
                        <div class="error-title">DATA LOAD ERROR</div>
                        <div class="error-message">
                            ${error.message}<br><br>
                            Ensure the automated pipeline has run at least once and results are committed to GitHub.
                        </div>
                    </div>
                `;
            }
        }

        function renderDashboard(text, filename) {
            const dateMatch = filename.match(/dashboard_([\d-]+)\.txt/);
            const date = dateMatch ? dateMatch[1] : 'UNKNOWN';
            document.getElementById('last-update').textContent = date;

            // Parse metrics
            const winRateMatch = text.match(/WIN RATE: ([\d.]+)%/);
            const winRate = winRateMatch ? parseFloat(winRateMatch[1]) : null;

            const totalMatch = text.match(/Total Predictions: (\d+)/);
            const total = totalMatch ? parseInt(totalMatch[1]) : 0;

            const correctMatch = text.match(/Correct: (\d+)/);
            const correct = correctMatch ? parseInt(correctMatch[1]) : 0;

            const wrongMatch = text.match(/Wrong: (\d+)/);
            const wrong = wrongMatch ? parseInt(wrongMatch[1]) : 0;

            const highConfMatch = text.match(/HIGH\s+(\d+)\s+(\d+)\s+([\d.]+)%/);
            const highConfWinRate = highConfMatch ? parseFloat(highConfMatch[3]) : null;
            const highConfTotal = highConfMatch ? parseInt(highConfMatch[1]) : 0;

            const pendingMatch = text.match(/Total pending: (\d+)/);
            const pending = pendingMatch ? parseInt(pendingMatch[1]) : 0;

            const predictions = parsePredictions(text);
            const tierPerformance = parsePerformanceByTier(text);

            // Determine win rate status
            const winRateClass = winRate >= 60 ? 'positive' : (winRate >= 55 ? 'neutral' : 'negative');
            const highConfClass = highConfWinRate >= 70 ? 'positive' : (highConfWinRate >= 65 ? 'neutral' : 'negative');

            const app = document.getElementById('app');

            app.innerHTML = `
                <!-- Primary Metrics -->
                <div class="primary-metrics">
                    <div class="metric-card">
                        <div class="metric-label">Overall Win Rate</div>
                        <div class="metric-value ${winRateClass}">${winRate !== null ? winRate.toFixed(1) + '%' : 'N/A'}</div>
                        <div class="metric-subtext">
                            <span>${correct} CORRECT</span>
                            <span>•</span>
                            <span>${wrong} WRONG</span>
                            <span>•</span>
                            <span>${total} TOTAL</span>
                        </div>
                        <div class="metric-target">
                            <span>TARGET: 60.0%</span>
                            <span>•</span>
                            <span style="color: ${winRate >= 60 ? 'var(--accent-green)' : 'var(--accent-red)'}">
                                ${winRate !== null ? (winRate >= 60 ? '▲ ON TARGET' : '▼ BELOW') : '—'}
                            </span>
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">High Confidence Win Rate</div>
                        <div class="metric-value ${highConfClass}">${highConfWinRate !== null ? highConfWinRate.toFixed(1) + '%' : 'N/A'}</div>
                        <div class="metric-subtext">
                            <span>${highConfTotal} PREDICTIONS</span>
                            <span>•</span>
                            <span>CONFIDENCE ≥ 65%</span>
                        </div>
                        <div class="metric-target">
                            <span>TARGET: 70.0%</span>
                            <span>•</span>
                            <span style="color: ${highConfWinRate >= 70 ? 'var(--accent-green)' : 'var(--accent-red)'}">
                                ${highConfWinRate !== null ? (highConfWinRate >= 70 ? '▲ ON TARGET' : '▼ BELOW') : '—'}
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Secondary Metrics -->
                <div class="secondary-metrics">
                    <div class="mini-metric">
                        <div class="mini-metric-label">Total Predictions</div>
                        <div class="mini-metric-value">${total}</div>
                    </div>
                    <div class="mini-metric">
                        <div class="mini-metric-label">Correct</div>
                        <div class="mini-metric-value" style="color: var(--accent-green)">${correct}</div>
                    </div>
                    <div class="mini-metric">
                        <div class="mini-metric-label">Wrong</div>
                        <div class="mini-metric-value" style="color: var(--accent-red)">${wrong}</div>
                    </div>
                    <div class="mini-metric">
                        <div class="mini-metric-label">Pending</div>
                        <div class="mini-metric-value" style="color: var(--text-secondary)">${pending}</div>
                    </div>
                </div>

                <!-- Performance by Confidence Tier -->
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">Performance by Confidence Tier</h2>
                        <span class="section-meta">CALIBRATION ANALYSIS</span>
                    </div>
                    <div class="performance-grid">
                        ${renderTierPerformance('HIGH', tierPerformance.high)}
                        ${renderTierPerformance('MEDIUM', tierPerformance.medium)}
                        ${renderTierPerformance('LOW', tierPerformance.low)}
                    </div>
                </div>

                <!-- Recent Predictions -->
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">Recent Predictions</h2>
                        <span class="section-meta">LAST ${Math.min(predictions.length, 10)} PREDICTIONS</span>
                    </div>
                    <div class="predictions-table">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>DATE</th>
                                        <th>TICKER</th>
                                        <th>MOVE</th>
                                        <th>CATALYST</th>
                                        <th>CONFIDENCE</th>
                                        <th>PROBABILITY</th>
                                        <th>RESULT</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${renderPredictionsTable(predictions.slice(0, 10))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            // Animate performance bars
            setTimeout(() => {
                document.querySelectorAll('.performance-fill').forEach(fill => {
                    const width = fill.getAttribute('data-width');
                    fill.style.width = width;
                });
            }, 100);
        }

        function renderTierPerformance(tier, data) {
            if (!data) {
                return `
                    <div class="performance-item">
                        <div class="performance-header">
                            <span class="performance-tier tier-${tier.toLowerCase()}">${tier}</span>
                            <span class="performance-count">0 predictions</span>
                        </div>
                        <div class="performance-rate">—</div>
                        <div class="performance-bar">
                            <div class="performance-fill" data-width="0%" style="width: 0%"></div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="performance-item">
                    <div class="performance-header">
                        <span class="performance-tier tier-${tier.toLowerCase()}">${tier}</span>
                        <span class="performance-count">${data.correct}/${data.total}</span>
                    </div>
                    <div class="performance-rate">${data.rate.toFixed(1)}%</div>
                    <div class="performance-bar">
                        <div class="performance-fill" data-width="${data.rate}%" style="width: 0%"></div>
                    </div>
                </div>
            `;
        }

        function renderPredictionsTable(predictions) {
            if (predictions.length === 0) {
                return '<tr><td colspan="7" style="text-align: center; color: var(--text-tertiary); padding: 40px;">No predictions available</td></tr>';
            }

            return predictions.map(p => {
                const resultIcon = p.result.includes('CORRECT') ? '✓' :
                                 p.result.includes('WRONG') ? '✗' :
                                 '⋯';
                const resultClass = p.result.includes('CORRECT') ? 'result-correct' :
                                  p.result.includes('WRONG') ? 'result-wrong' :
                                  'result-pending';

                return `
                    <tr>
                        <td class="date">${p.date}</td>
                        <td class="ticker">${p.ticker}</td>
                        <td>
                            <span class="move-indicator move-${p.direction.toLowerCase()}">
                                ${p.direction === 'UP' ? '▲' : '▼'} ${p.magnitude.toFixed(1)}%
                            </span>
                        </td>
                        <td>${p.catalyst.toUpperCase()}</td>
                        <td>
                            <span class="performance-tier tier-${p.confidence.toLowerCase()}">${p.confidence}</span>
                        </td>
                        <td class="probability">${p.probability.toFixed(1)}%</td>
                        <td>
                            <span class="result-icon ${resultClass}">${resultIcon}</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Load on page load
        loadDashboardData();

        // Refresh every 5 minutes
        setInterval(loadDashboardData, 5 * 60 * 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swing Model - Live Paper Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-value.green {
            color: #10b981;
        }

        .stat-value.red {
            color: #ef4444;
        }

        .stat-subtext {
            font-size: 12px;
            color: #666;
        }

        .predictions-table {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .table-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 20px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        th {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        td {
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.high {
            background: #10b981;
            color: #000;
        }

        .badge.medium {
            background: #f59e0b;
            color: #000;
        }

        .badge.low {
            background: #6b7280;
            color: #fff;
        }

        .badge.up {
            background: #10b981;
            color: #000;
        }

        .badge.down {
            background: #ef4444;
            color: #fff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #1a0000;
            border: 1px solid #440000;
            border-radius: 8px;
            padding: 20px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .refresh-info {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Swing Model - Live Paper Trading</h1>
            <p class="subtitle">Catalyst-Aware Mean Reversion | 67.7% Backtest Accuracy</p>
        </header>

        <div id="app">
            <div class="loading">Loading latest data from GitHub...</div>
        </div>

        <div class="refresh-info">
            Updates daily at 6 PM ET | Last updated: <span id="last-update">--</span>
        </div>
    </div>

    <script>
        // Fetch latest dashboard data from GitHub
        async function loadDashboardData() {
            const app = document.getElementById('app');

            try {
                // Get list of daily results from GitHub
                const response = await fetch('https://api.github.com/repos/YOUR_USERNAME/swing-model/contents/daily_results');

                if (!response.ok) {
                    throw new Error('Failed to fetch data');
                }

                const files = await response.json();

                // Find latest dashboard file
                const dashboardFiles = files.filter(f => f.name.startsWith('dashboard_'));
                if (dashboardFiles.length === 0) {
                    app.innerHTML = '<div class="error">No data available yet. Run the pipeline to generate predictions.</div>';
                    return;
                }

                // Get most recent file
                const latestFile = dashboardFiles.sort((a, b) => b.name.localeCompare(a.name))[0];

                // Fetch file content
                const fileResponse = await fetch(latestFile.download_url);
                const dashboardText = await fileResponse.text();

                // Parse dashboard text (this is the output from dashboard.py)
                renderDashboard(dashboardText, latestFile.name);

            } catch (error) {
                console.error('Error loading data:', error);
                app.innerHTML = `
                    <div class="error">
                        <strong>Error loading data</strong><br>
                        ${error.message}<br><br>
                        Make sure to:<br>
                        1. Replace YOUR_USERNAME in dashboard.html<br>
                        2. Run the pipeline at least once<br>
                        3. Commit results to GitHub
                    </div>
                `;
            }
        }

        function renderDashboard(text, filename) {
            // Extract date from filename
            const dateMatch = filename.match(/dashboard_([\d-]+)\.txt/);
            const date = dateMatch ? dateMatch[1] : 'Unknown';

            document.getElementById('last-update').textContent = date;

            // Parse win rate
            const winRateMatch = text.match(/WIN RATE: ([\d.]+)%/);
            const winRate = winRateMatch ? parseFloat(winRateMatch[1]) : null;

            // Parse total predictions
            const totalMatch = text.match(/Total Predictions: (\d+)/);
            const total = totalMatch ? parseInt(totalMatch[1]) : 0;

            // Parse correct predictions
            const correctMatch = text.match(/Correct: (\d+)/);
            const correct = correctMatch ? parseInt(correctMatch[1]) : 0;

            // Parse high confidence win rate
            const highConfMatch = text.match(/HIGH\s+(\d+)\s+(\d+)\s+([\d.]+)%/);
            const highConfWinRate = highConfMatch ? parseFloat(highConfMatch[3]) : null;

            // Parse pending predictions
            const pendingMatch = text.match(/Total pending: (\d+)/);
            const pending = pendingMatch ? parseInt(pendingMatch[1]) : 0;

            // Render
            const app = document.getElementById('app');

            const winRateClass = winRate >= 60 ? 'green' : (winRate >= 55 ? '' : 'red');
            const target = 60;

            app.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Overall Win Rate</div>
                        <div class="stat-value ${winRateClass}">${winRate !== null ? winRate.toFixed(1) + '%' : 'N/A'}</div>
                        <div class="stat-subtext">Target: ${target}% | ${total} predictions</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-label">High Confidence Win Rate</div>
                        <div class="stat-value ${highConfWinRate >= 70 ? 'green' : ''}">${highConfWinRate !== null ? highConfWinRate.toFixed(1) + '%' : 'N/A'}</div>
                        <div class="stat-subtext">Best trades</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-label">Correct Predictions</div>
                        <div class="stat-value">${correct}</div>
                        <div class="stat-subtext">Out of ${total} total</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-label">Pending Predictions</div>
                        <div class="stat-value">${pending}</div>
                        <div class="stat-subtext">Awaiting outcome</div>
                    </div>
                </div>

                <div class="predictions-table">
                    <div class="table-header">
                        <h2>Recent Activity</h2>
                    </div>
                    <div style="padding: 20px;">
                        <pre style="font-size: 12px; color: #888; overflow-x: auto; white-space: pre-wrap;">${text.substring(0, 2000)}${text.length > 2000 ? '\n\n... (view full dashboard in GitHub)' : ''}</pre>
                    </div>
                </div>
            `;
        }

        // Load on page load
        loadDashboardData();

        // Refresh every 5 minutes
        setInterval(loadDashboardData, 5 * 60 * 1000);
    </script>
</body>
</html>
